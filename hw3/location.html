<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Location</title>
  <meta name="description" content="location of the user on a map using geolocation.">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">ABC Toys</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar"
          aria-controls="collapsibleNavbar" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="collapsibleNavbar">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link text-white" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="products.html">Products</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="location.html">Location</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="contact.html">Contact Us</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="extra.html">Extra</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container page-content">
    <section class="p-4 custom-section">
      <h1 class="text-center mb-4">Your Current Location</h1>

      <p id="locationText">Finding your location...</p>

      <div id="map"></div>
    </section>
  </main>

  <script>
    const map = L.map("map");
    map.setView([0, 0], 15);

    const marker = L.marker([0, 0]).addTo(map);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "OpenStreetMap contributors"
    }).addTo(map);

    function showPosition(position) {
      const latitude = position.coords.latitude;
      const longitude = position.coords.longitude;

      document.getElementById("locationText").innerHTML =
        "<strong>Latitude:</strong> " + latitude +
        "<br><strong>Longitude:</strong> " + longitude;

      marker.setLatLng([latitude, longitude]);
      marker.bindTooltip("You are here!");
      map.setView([latitude, longitude], 15);
    }

    function showError(error) {
      let message = "";

      if (error.code == 1) {
        message = "User denied the request for Geolocation.";
      }
      if (error.code == 2) {
        message = "Location information is unavailable.";
      }
      if (error.code == 3) {
        message = "The request to get user location timed out.";
      }

      document.getElementById("locationText").innerHTML = message;
    }

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(showPosition, showError);
    } else {
      document.getElementById("locationText").innerHTML =
        "Geolocation is not supported by this browser.";
    }
  </script>
</body>

</html>
