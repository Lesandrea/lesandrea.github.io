<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Contact Us</title>
  <meta name="description" content="Contact page for ABC Toys">
  <meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- css -->
  <link rel="stylesheet" href="style.css">
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">ABC Toys</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar" aria-controls="collapsibleNavbar" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="collapsibleNavbar">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link text-white" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="products.html">Products</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="location.html">Location</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="contact.html">Contact Us</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="extra.html">Extra</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container" style="padding-top: 100px; padding-bottom: 40px;">
    <section class="p-4 custom-section">
      <h1 class="text-center mb-4">Contact Us</h1>

      <div class="row">
        <div class="col-md-6 mb-4">
          <h2>Company Information</h2>
          <p><strong>Email:</strong> info@abctoys.com</p>
          <p><strong>Phone:</strong> (123) 456-7890</p>
          <p><strong>Address:</strong> 123 Fun Toys, Toy Landia, CA 12345</p>
          <p><strong>Facebook:</strong> <a href="https://www.facebook.com/" target="_blank">Visit our Facebook page</a></p>
        </div>

        <div class="col-md-6">
          <h2>Send Us a Comment</h2>
          <form>
            <div class="mb-3">
              <label for="name" class="form-label">Name</label>
              <input type="text" class="form-control" id="name" name="name" required>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email Address</label>
              <input type="email" class="form-control" id="email" name="email" required>
            </div>

            <div class="mb-3">
              <label for="comment" class="form-label">Additional Comments</label>
              <textarea class="form-control" id="comment" name="comment" rows="5" required></textarea>
            </div>

            <button type="submit" class="btn btn-light">Submit</button>
          </form>
        </div>
      </div>
    </section>
  </main>
</body>

</html>
